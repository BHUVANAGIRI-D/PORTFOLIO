<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Portfolio</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body>

<canvas id="particles"></canvas>
<div class="cursor"></div>

<header>
<h1>My Portfolio</h1>
<nav>
<a href="#about">About</a>
<a href="#skills">Skills</a>
<a href="#projects">Projects</a>
<a href="#contact">Contact</a>
</nav>
</header>

<section class="hero">
<div class="profile-box">
  <span class="ring ring1"></span>
  <span class="ring ring2"></span>
  <img src="profile.jpg" class="profile">
</div>

<h2>Hello I'm <span>BHUVANAGIRI</span></h2>
<h3 id="typing"></h3>

<button class="btn" onclick="goProject()">View Projects</button>

<audio id="music" loop>
  <source src="music.mp3" type="audio/mp3">
</audio>
</section>

<section id="about" class="fade">
<h2>About</h2>
<p>I am a developer passionate about Web & AI.</p>
</section>

<section id="skills" class="fade">
<h2>Skills</h2>
<div class="grid">
<div class="card">HTML</div>
<div class="card">CSS</div>
<div class="card">JavaScript</div>
<div class="card">Python</div>
</div>
</section>

<section id="projects" class="fade">
<h2>Projects</h2>
<div class="grid">
<div class="card">Project 1</div>
<div class="card">Project 2</div>
</div>
</section>

<!-- CONTACT -->
<section id="contact" class="fade">
<h2>Contact Me</h2>

<div class="contact-box">

  <div class="input-group">
    <input type="text" required>
    <label>Name</label>
  </div>

  <div class="input-group">
    <input type="email" required>
    <label>Email</label>
  </div>

  <div class="input-group">
    <textarea rows="5" required></textarea>
    <label>Message</label>
  </div>

  <button class="btn send-btn">Send Message 🚀</button>

</div>
</section>

<footer>
<p>© 2026 Trioo</p>
</footer>

<script src="script.js"></script>
</body>
</html>
